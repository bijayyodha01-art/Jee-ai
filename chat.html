<!DOCTYPE html>
<html>
<head>
<title>JEE AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#111827;
color:white;
padding:20px;
}
#box{
background:#1f2937;
padding:20px;
border-radius:15px;
}
input{
width:80%;
padding:12px;
}
button{
padding:12px;
}
</style>

</head>

<body>

<h1>🤖 JEE AI</h1>

<div id="box">
<p id="reply">Ask your doubt...</p>

<input id="q" placeholder="Type question">

<button onclick="ask()">
Send
</button>

</div>

<script>

<script>

function ask(){

let q = document.getElementById("q").value.toLowerCase();
let r = document.getElementById("reply");

if(q==""){
r.innerHTML="Type your question 😄";
}
else if(q.includes("physics")){
r.innerHTML="🤖 AI: Physics has Motion, Force, Energy";
}
else if(q.includes("chemistry")){
r.innerHTML="🤖 AI: Chemistry has Atoms, Bonds, Reactions";
}
else if(q.includes("math")){
r.innerHTML="🤖 AI: Maths has Algebra, Calculus, Geometry";
}
else{
r.innerHTML="🤖 AI: Ask me Physics, Chemistry or Maths";
}

}

</script>
</script>

</body>
</html>
